<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c"></canvas>
<script>
const sizes = [72,96,128,144,152,192,384,512]
sizes.forEach(size => {
  const canvas = document.createElement('canvas')
  canvas.width = canvas.height = size
  const ctx = canvas.getContext('2d')
  const r = size * 0.22

  // Fondo gradiente
  const grad = ctx.createLinearGradient(0, 0, size, size)
  grad.addColorStop(0, '#6366f1')
  grad.addColorStop(1, '#8b5cf6')
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0)
  ctx.quadraticCurveTo(size, 0, size, r)
  ctx.lineTo(size, size-r)
  ctx.quadraticCurveTo(size, size, size-r, size)
  ctx.lineTo(r, size)
  ctx.quadraticCurveTo(0, size, 0, size-r)
  ctx.lineTo(0, r)
  ctx.quadraticCurveTo(0, 0, r, 0)
  ctx.closePath()
  ctx.fill()

  // Círculo decorativo
  ctx.fillStyle = 'rgba(255,255,255,0.08)'
  ctx.beginPath()
  ctx.arc(size*0.75, size*0.25, size*0.35, 0, Math.PI*2)
  ctx.fill()

  // Letra F estilizada
  const u = size/8
  ctx.fillStyle = 'rgba(255,255,255,0.95)'
  // Barra 1 corta
  ctx.beginPath(); ctx.roundRect(u*2, u*3.5, u, u*2.5, u*0.2); ctx.fill()
  // Barra 2 mediana
  ctx.beginPath(); ctx.roundRect(u*3.5, u*2.5, u, u*3.5, u*0.2); ctx.fill()
  // Barra 3 alta
  ctx.beginPath(); ctx.roundRect(u*5, u*3, u, u*3, u*0.2); ctx.fill()

  const link = document.createElement('a')
  link.download = `icon-${size}.png`
  link.href = canvas.toDataURL('image/png')
  link.textContent = `⬇ icon-${size}.png`
  link.style.cssText = 'display:block;margin:4px;font-family:sans-serif'
  document.body.appendChild(link)
})
document.body.insertAdjacentHTML('afterbegin','<h3 style="font-family:sans-serif">Clic en cada enlace para descargar</h3>')
</script>
</body>
</html>
